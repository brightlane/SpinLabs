<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found (404)</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      height: 100vh;
      margin: 0;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .box {
      max-width: 500px;
      padding: 30px;
    }

    h1 {
      font-size: 80px;
      margin: 0;
      color: #38bdf8;
    }

    p {
      font-size: 18px;
      margin: 15px 0;
      color: #cbd5e1;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    a:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>404</h1>
    <p>Sorry, the page you are looking for doesn’t exist or has been moved.</p>
    <p>Check the URL or go back to the homepage.</p>
    <a href="/">Go to Homepage</a>
  </div>
</body>
</html>
