<section class="email-capture" aria-labelledby="email-form-heading">
  <h2 id="email-form-heading">Sign Up & Get Free Spins Instantly!</h2>
  <p>Enter your email to claim the exclusive US Slotswise welcome bonus and unlock extra rewards!</p>

  <form id="signupForm">
    <input type="email" id="userEmail" name="email" placeholder="Enter your email" required>
    <button type="submit">Claim My Bonus</button>
  </form>

  <!-- Instant feedback message -->
  <p id="formMessage" style="display:none;margin-top:1rem;color:green;font-weight:bold;"></p>
</section>

<script>
// Conversion-optimized AJAX email capture
document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('signupForm');
  const emailInput = document.getElementById('userEmail');
  const message = document.getElementById('formMessage');
  const affiliateURL = "https://convert.ctypy.com/aff_c?offer_id=29526&aff_id=21885";

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = emailInput.value.trim();
    if (!email) {
      alert("Please enter a valid email address!");
      return;
    }

    // Show instant thank-you message
    message.textContent = "Thank you! Redirecting you to claim your bonus...";
    message.style.display = "block";

    try {
      // Send email to affiliate system via GET request
      const redirectURL = `${affiliateURL}&email=${encodeURIComponent(email)}`;
      setTimeout(() => {
        window.location.href = redirectURL;
      }, 1500); // Short delay to let the user see the message
    } catch (err) {
      message.textContent = "Oops! Something went wrong. Please try again.";
      console.error(err);
    }
  });
});
</script>
