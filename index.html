<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Massive Jackpot Wins at SlotsWise! Play and win big with floating coins and riches!">
    <meta name="keywords" content="jackpot, slot machine, big win, win big, casino, online slots, floating money">
    <title>Big Jackpot Wins at SlotsWise!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 35px;
            color: #FFD700;
            font-weight: bold;
            text-transform: uppercase;
            animation: fireworks 1.5s infinite, rotateColors 5s infinite linear;
            position: relative;
            z-index: 1;
            cursor: pointer;
        }

        /* Firework effect for headline */
        @keyframes fireworks {
            0% {
                text-shadow: 0 0 5px #FFD700, 0 0 10px #FFD700, 0 0 15px #ff5733, 0 0 20px #ff1493, 0 0 25px #ff1493;
            }

            50% {
                text-shadow: 0 0 5px #28a745, 0 0 10px #28a745, 0 0 15px #00bfff, 0 0 20px #00bfff, 0 0 25px #ff1493;
            }

            100% {
                text-shadow: 0 0 5px #FFD700, 0 0 10px #FFD700, 0 0 15px #ff5733, 0 0 20px #ff1493, 0 0 25px #ff1493;
            }
        }

        @keyframes rotateColors {
            0% {
                color: #FFD700;
            }

            25% {
                color: #ff5733;
            }

            50% {
                color: #28a745;
            }

            75% {
                color: #00bfff;
            }

            100% {
                color: #ff1493;
            }
        }

        /* Floating Coins */
        .coin {
            position: absolute;
            width: 50px;
            height: 50px;
            background: url('https://www.pngall.com/wp-content/uploads/2016/06/Gold-Coin-PNG-Image.png') no-repeat center center;
            background-size: contain;
            animation: floatCoins 5s linear infinite;
            z-index: 0;
        }

        @keyframes floatCoins {
            0% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-200px) rotate(180deg);
            }

            100% {
                transform: translateY(0) rotate(360deg);
            }
        }

        .slot-machines-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 50px;
        }

        .slot-machine {
            margin: 0 20px;
            width: 300px;
            height: 200px;
            background-color: #f0f0f0;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .slot-machine:hover {
            transform: scale(1.1);
        }

        .slot-machine img {
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }

        .cta-button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 20px;
            color: #fff;
            background-color: #f44336;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .cta-button:hover {
            background-color: #d32f2f;
        }

        #jackpot-sound {
            display: none;
        }

        /* Styling for the Jackpot button */
        .claim-button {
            margin-top: 20px;
            padding: 20px 40px;
            font-size: 24px;
            color: #fff;
            background-color: #ff1493;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
        }

        .claim-button:hover {
            background-color: #ff4da6;
        }
    </style>
</head>

<body>

    <!-- Headline that is clickable -->
    <h1 onclick="window.location.href='https://convert.ctypy.com/aff_c?offer_id=29526&aff_id=21885'">
        Congratulations, You Could Win A Million Dollars!
    </h1>

    <!-- Floating Coins -->
    <div class="coin" style="top: 100px; left: 20%;"></div>
    <div class="coin" style="top: 200px; left: 40%;"></div>
    <div class="coin" style="top: 300px; left: 60%;"></div>
    <div class="coin" style="top: 400px; left: 80%;"></div>

    <div class="slot-machines-container">
        <!-- Slot Machine Images -->
        <a href="https://convert.ctypy.com/aff_c?offer_id=29526&aff_id=21885" class="slot-machine">
            <img src="https://media.istockphoto.com/id/1137983955/photo/jackpot-slot-machine-with-crowd-of-golden-coins.jpg?s=612x612&w=0&k=20&c=CoQbdwbfs8yFd5wK3uELRB5seCp5Yp3zkp1Q5EMjRkA=" alt="Triple Sevens Slot">
        </a>
        <a href="https://convert.ctypy.com/aff_c?offer_id=29526&aff_id=21885" class="slot-machine">
            <img src="https://media.istockphoto.com/id/1137983955/photo/jackpot-slot-machine-with-crowd-of-golden-coins.jpg?s=612x612&w=0&k=20&c=CoQbdwbfs8yFd5wK3uELRB5seCp5Yp3zkp1Q5EMjRkA=" alt="Triple Sevens Slot">
        </a>
        <a href="https://convert.ctypy.com/aff_c?offer_id=29526&aff_id=21885" class="slot-machine">
            <img src="https://media.istockphoto.com/id/1137983955/photo/jackpot-slot-machine-with-crowd-of-golden-coins.jpg?s=612x612&w=0&k=20&c=CoQbdwbfs8yFd5wK3uELRB5seCp5Yp3zkp1Q5EMjRkA=" alt="Triple Sevens Slot">
        </a>
    </div>

    <button class="claim-button" onclick="claimJackpot()">Claim Your Jackpot Now!</button>

    <!-- Jackpot Sound -->
    <audio id="jackpot-sound" preload="auto">
        <source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
        Your browser does not support the audio tag.
    </audio>

    <script>
        // Function to play jackpot sound when claiming jackpot
        function claimJackpot() {
            var sound = document.getElementById("jackpot-sound");
            sound.play();
            window.location.href = "https://convert.ctypy.com/aff_c?offer_id=29526&aff_id=21885";
        }
    </script>

</body>

</html>
