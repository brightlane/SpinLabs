  header {
    display: flex;

  header a.logo {

  header a.cta {
    background: #0077ff;
    padding: 12px 24px;
    color: #fff;
    font-weight: bold;
    border-radius: 8px;
    text-decoration: none;
  }

  .hero {
    text-align: center;
    padding: 80px 20px 40px 20px;
    position: relative;
  }

  .jackpot {
    font-size: 3rem;
    font-weight: bold;
    color: #ffd700;

    margin-bottom: 20px;
  }

  @keyframes sparkle {
    0% { text-shadow: 0 0 10px #fff, 0 0 20px #ffd700, 0 0 30px #ffae00; }
    50% { text-shadow: 0 0 20px #fff, 0 0 40px #ffd700, 0 0 60px #ffae00; }

  .coins {
    position: absolute;
    width: 100%;
    height: 300px;
    top: 0;
    left: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .coin {
    position: absolute;
    width: 20px;
    height: 20px;
    background: radial-gradient(circle at 30% 30%, #ff0, #ffa500);
    border-radius: 50%;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(800px) rotate(360deg); opacity: 0; }
  }

  .cta-hero {
    display: inline-block;
    background: #ff0000;
    padding: 18px 36px;
    border-radius: 12px;
    font-size: 1.3rem;
    font-weight: bold;
    text-decoration: none;
    color: #fff;

<script>
// Generate falling coins
const coinsContainer = document.getElementById('coins-container');
for (let i = 0; i < 30; i++) {
  const coin = document.createElement('div');
  coin.classList.add('coin');
  coin.style.left = Math.random() * window.innerWidth + 'px';
  coin.style.animationDuration = 2 + Math.random() * 3 + 's';
  coin.style.width = coin.style.height = 15 + Math.random() * 15 + 'px';
  coinsContainer.appendChild(coin);
}
