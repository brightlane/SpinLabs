<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Massive Jackpot Wins! Celebrate and win big at SlotsWise!">
    <meta name="keywords" content="jackpot, big win, money, casino, online slots">
    <title>Congratulations! You Could Win a Million Dollars!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        /* Sparkling effect on the headline */
        h1 {
            font-size: 40px;
            color: #FFD700;
            font-weight: bold;
            text-transform: uppercase;
            animation: fireworks 2s infinite, rotateColors 5s infinite linear;
            position: relative;
            cursor: pointer;
            padding-top: 50px;
        }

        @keyframes fireworks {
            0% {
                text-shadow: 0 0 5px #FFD700, 0 0 10px #FFD700, 0 0 15px #ff5733, 0 0 20px #ff1493, 0 0 25px #ff1493;
            }

            50% {
                text-shadow: 0 0 5px #28a745, 0 0 10px #28a745, 0 0 15px #00bfff, 0 0 20px #00bfff, 0 0 25px #ff1493;
            }

            100% {
                text-shadow: 0 0 5px #FFD700, 0 0 10px #FFD700, 0 0 15px #ff5733, 0 0 20px #ff1493, 0 0 25px #ff1493;
            }
        }

        @keyframes rotateColors {
            0% {
                color: #FFD700;
            }

            25% {
                color: #ff5733;
            }

            50% {
                color: #28a745;
            }

            75% {
                color: #00bfff;
            }

            100% {
                color: #ff1493;
            }
        }

        /* Floating coins or dollar bills */
        .coin {
            position: absolute;
            width: 50px;
            height: 50px;
            background-size: cover;
            animation: float 6s infinite ease-in-out;
            z-index: 1;
            opacity: 0.9;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0);
            }

            50% {
                transform: translateY(-200px) rotate(180deg);
            }

            100% {
                transform: translateY(0) rotate(360deg);
            }
        }

        /* Button styling */
        .claim-button {
            margin-top: 30px;
            padding: 20px 40px;
            font-size: 24px;
            color: #fff;
            background-color: #ff1493;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
        }

        .claim-button:hover {
            background-color: #ff4da6;
        }

    </style>
</head>

<body>

    <!-- Clickable headline -->
    <h1 onclick="window.location.href='https://convert.ctypy.com/aff_c?offer_id=29526&aff_id=21885'">
        Congratulations, You Could Win a Million Dollars!
    </h1>

    <!-- Floating Coins Effect -->
    <div class="coin" style="top: 100px; left: 20%; background: url('https://brightlane.github.io/SpinLabs/coin.png');"></div>
    <div class="coin" style="top: 150px; left: 40%; background: url('https://brightlane.github.io/SpinLabs/coin.png');"></div>
    <div class="coin" style="top: 200px; left: 60%; background: url('https://brightlane.github.io/SpinLabs/coin.png');"></div>
    <div class="coin" style="top: 250px; left: 80%; background: url('https://brightlane.github.io/SpinLabs/coin.png');"></div>
    <div class="coin" style="top: 300px; left: 30%; background: url('https://brightlane.github.io/SpinLabs/coin.png');"></div>
    <div class="coin" style="top: 350px; left: 70%; background: url('https://brightlane.github.io/SpinLabs/coin.png');"></div>

    <!-- Claim button -->
    <button class="claim-button" onclick="claimJackpot()">Claim Your Jackpot Now!</button>

    <!-- Jackpot Sound -->
    <audio id="jackpot-sound" preload="auto">
        <source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
        Your browser does not support the audio tag.
    </audio>

    <script>
        // Function to play jackpot sound when claiming jackpot
        function claimJackpot() {
            var sound = document.getElementById("jackpot-sound");
            sound.play();
            window.location.href = "https://convert.ctypy.com/aff_c?offer_id=29526&aff_id=21885";
        }
    </script>

</body>

</html>
